name: Sync Amazon Prices

on:
  schedule:
    # Roda a cada 6 horas: 00:00, 06:00, 12:00, 18:00
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Permite rodar manualmente a qualquer momento pelo Github

jobs:
  sync_prices:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo fonte
        uses: actions/checkout@v4

      - name: Instalar NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Sincronizar precos com a Amazon
        run: node sync-prices.cjs
