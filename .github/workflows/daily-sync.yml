name: Sincronização Diária de Produtos

on:
  schedule:
    # Roda todos os dias às 06:30 UTC (03:30 AM Horário de Brasília)
    - cron: '30 6 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Run Sync Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://hrfyphdygyyjbajhuiuo.supabase.co' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node sync-data.cjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/descriptions.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração detectada nas descrições."
          else
            git commit -m "chore: atualização automática de descrições [skip ci]"
            git push
          fi
